name: Deploy to S3
on: [push]
permissions:
  id-token: write   # Requerido para OIDC
  contents: read  # Requerido para checkout
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout
          uses: actions/checkout@v4
        
        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: 24
        
        - name: Install dependencies
          run: npm ci

        - name: Build
          run: npm run build

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: arn:aws:iam::826980458891:role/Github-TerraOrganico-Website
            aws-region: us-east-2

        - name: Deploy
          run: aws s3 .output/public s3://terra-organico-website
        - name: Invalidate CloudFront
          run: |
            aws cloudfront create-invalidation \
              --distribution-id E2Z0LQXF2I73S4 \
              --paths "/*"